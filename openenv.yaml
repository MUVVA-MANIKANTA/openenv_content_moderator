name: ai_social_guard
version: 2.1.0
entrypoint: uvicorn src.server:app --host 0.0.0.0 --port 7860
port: 7860
reset_endpoint: /reset
step_endpoint: /step
state_endpoint: /state
action_space:
  type: SocialGuardAction
observation_space:
  type: SocialGuardObservation
reward_space:
  type: SocialGuardReward
  fields:
    value: float
    reason: str
state_space:
  type: SocialGuardState
reward:
  range: [0.0, 1.0]
  type: dense
tasks:
  - id: easy_spam
    difficulty: easy
    description: "4 posts — obvious spam vs safe content detection"
  - id: medium_reputation
    difficulty: medium
    description: "6 posts — spam, adult, sarcasm, dangerous misinfo with reputation signals"
  - id: hard_global
    difficulty: hard
    description: "9 posts — all categories, high-rep toxicity, ambiguous language traps"
  - id: crisis_response
    difficulty: ultra
    description: "5 posts — high-velocity misinfo attack from a serial offender (user 999)"
constraints:
  max_steps_per_episode: 10
  max_runtime_minutes: 20
  min_vcpu: 2
  min_ram_gb: 8
